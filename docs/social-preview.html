<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oikos — Social Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 640px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #0a0f1a 0%, #141c2e 50%, #1a2540 100%);
    display: flex;
    color: #fff;
  }

  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px 56px;
    z-index: 2;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0, 122, 255, 0.15);
    border: 1px solid rgba(0, 122, 255, 0.3);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 600;
    color: #5ac8fa;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 24px;
    width: fit-content;
  }

  .title {
    font-size: 72px;
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #ffffff 0%, #c8d6e5 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .tagline {
    font-size: 22px;
    font-weight: 400;
    color: #8899b0;
    line-height: 1.5;
    max-width: 440px;
    margin-bottom: 32px;
  }

  .features {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .feature {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    color: #a0b0c4;
  }

  .feature-icon {
    font-size: 15px;
  }

  .right {
    width: 560px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .screenshot-wrapper {
    position: relative;
    transform: perspective(1200px) rotateY(-8deg) rotateX(2deg);
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 24px 80px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.08);
  }

  .screenshot-wrapper img {
    display: block;
    width: 500px;
    height: auto;
    border-radius: 12px;
  }

  /* Gradient overlay on the screenshot edges */
  .screenshot-wrapper::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    background: linear-gradient(90deg, rgba(10, 15, 26, 0.4) 0%, transparent 30%, transparent 100%);
    pointer-events: none;
  }

  /* Subtle glow behind screenshot */
  .right::before {
    content: '';
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(0, 122, 255, 0.12) 0%, transparent 70%);
    border-radius: 50%;
    z-index: -1;
  }

  .footer {
    position: absolute;
    bottom: 28px;
    left: 56px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    color: #556680;
  }

  .footer span {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #556680;
  }
</style>
</head>
<body>

  <div class="left">
    <div class="badge">Self-Hosted &middot; Open Source</div>
    <div class="title">Oikos</div>
    <p class="tagline">The family planner that respects your privacy. Tasks, calendars, shopping, meals, budget &mdash; on your own server.</p>
    <div class="features">
      <span class="feature"><span class="feature-icon">&#x2705;</span> Tasks</span>
      <span class="feature"><span class="feature-icon">&#x1F4C5;</span> Calendar</span>
      <span class="feature"><span class="feature-icon">&#x1F6D2;</span> Shopping</span>
      <span class="feature"><span class="feature-icon">&#x1F35D;</span> Meals</span>
      <span class="feature"><span class="feature-icon">&#x1F4B0;</span> Budget</span>
      <span class="feature"><span class="feature-icon">&#x1F4CC;</span> Notes</span>
      <span class="feature"><span class="feature-icon">&#x1F465;</span> Contacts</span>
      <span class="feature"><span class="feature-icon">&#x1F512;</span> Encrypted</span>
    </div>
  </div>

  <div class="right">
    <!-- Replace with your actual tablet screenshot path -->
    <div class="screenshot-wrapper">
      <img src="../docs/screenshots/tablet-light/tablet-light-dashboard-2.png" alt="Dashboard">
    </div>
  </div>

  <div class="footer">
    <span>MIT License</span>
    <div class="dot"></div>
    <span>Docker &middot; Express &middot; SQLite &middot; Vanilla JS</span>
    <div class="dot"></div>
    <span>github.com/ulsklyc/oikos</span>
  </div>

</body>
</html>
